name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  node:
    name: node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.0
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.6.9

      - name: Verify pinned runtimes
        run: npm run verify:runtimes:pinned

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test (Node lower coverage)
        run: npm run test:coverage:node-lower

      - name: Test (Runtime Node)
        run: npm run test:runtime:node

      - name: Test (Runtime Browser)
        run: npm run test:runtime:browser

      - name: Test (Integration Node)
        run: npm run test:integration:node

      - name: Security fuzz
        run: npm run test:fuzz

      - name: Fail on tracked-file churn
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain=v1)" ]]; then
            echo "Tracked files changed during the node job:"
            git status --porcelain=v1
            exit 1
          fi

  deno:
    name: deno
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.0
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.6.9

      - name: Verify pinned runtimes
        run: npm run verify:runtimes:pinned

      - name: Install
        run: npm ci

      - name: Test (Runtime Deno)
        run: npm run test:runtime:deno

      - name: Test (Integration Deno)
        run: npm run test:integration:deno

      - name: Fail on tracked-file churn
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain=v1)" ]]; then
            echo "Tracked files changed during the deno job:"
            git status --porcelain=v1
            exit 1
          fi

  bun:
    name: bun
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.0
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.9

      - name: Verify pinned runtimes
        run: npm run verify:runtimes:pinned

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (Runtime Bun)
        run: npm run test:runtime:bun

      - name: Test (Integration Bun)
        run: npm run test:integration:bun

      - name: Fail on tracked-file churn
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain=v1)" ]]; then
            echo "Tracked files changed during the bun job:"
            git status --porcelain=v1
            exit 1
          fi
