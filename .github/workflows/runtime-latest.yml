name: Runtime Latest (Non-blocking)

on:
  schedule:
    - cron: "11 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-latest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latest-runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node (latest stable)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: current
          cache: npm

      - name: Setup Deno (latest stable)
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: latest

      - name: Setup Bun (latest stable)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Runtime staleness policy
        run: npm run runtime:staleness

      - name: Runtime smoke matrix
        run: npm run smoke:all

      - name: Fail on tracked-file churn
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain=v1)" ]]; then
            echo "Tracked files changed during the runtime-latest job:"
            git status --porcelain=v1
            exit 1
          fi
